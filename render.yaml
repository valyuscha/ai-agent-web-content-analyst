services:
  - type: web
    name: web-analyst-backend
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r web-analyst-web/backend/requirements.txt
    startCommand: cd web-analyst-web/backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: web-analyst-frontend
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd web-analyst-web/frontend && npm install && npm run build
    startCommand: cd web-analyst-web/frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://web-analyst-backend.onrender.com
