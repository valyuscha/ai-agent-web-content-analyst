services:
  - type: web
    name: web-analyst-backend
    env: python
    plan: free
    rootDir: web-analyst-web/backend
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: web-analyst-frontend
    env: node
    plan: free
    rootDir: web-analyst-web/frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://web-analyst-backend.onrender.com
